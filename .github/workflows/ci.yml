name: CI

on:
  push:
  pull_request:

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Build both daemons
  # ──────────────────────────────────────────────────────────────
  build-c:
    name: Build C Daemons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make netcat-openbsd
      - name: Build All Daemons
        run: make all -j$(nproc)
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            l3/fibd
            l2/l2d
            ip/ip_daemon
            vrf/vrf_daemon
            evpn/evpn_daemon
            vxlan/vxlan_daemon
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 2: Python Testing (BFD/LLDP)
  # ──────────────────────────────────────────────────────────────
  test-python:
    name: Pytest (BFD & LLDP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run Pytest
        run: pytest

  # ──────────────────────────────────────────────────────────────
  # Job 3: L3 functional tests
  # ──────────────────────────────────────────────────────────────
  test-l3:
    name: Test L3 (RIB + FIB)
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
      - name: Run L3 tests
        run: |
          chmod +x l3/fibd
          bash tests/test_l3.sh

  # ──────────────────────────────────────────────────────────────
  # Job 4: L2 functional tests
  # ──────────────────────────────────────────────────────────────
  test-l2:
    name: Test L2 (FDB + STP + LACP + …)
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
      - name: Run L2 tests
        run: |
          chmod +x l2/l2d
          bash tests/test_l2.sh

  # ──────────────────────────────────────────────────────────────
  # Job 5: Persistence + SIGHUP tests
  # ──────────────────────────────────────────────────────────────
  test-persist:
    name: Test persistence + SIGHUP
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
      - name: Run persistence tests
        run: |
          chmod +x l3/fibd l2/l2d
          bash tests/test_persist.sh

  # ──────────────────────────────────────────────────────────────
  # Job 6: Build with stricter flags (catches latent issues)
  # ──────────────────────────────────────────────────────────────
  build-strict:
    name: Build (strict warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make
      - name: Build L3 with -Werror
        working-directory: l3
        run: make -j$(nproc) CFLAGS="-Wall -Wextra -Wpedantic -std=c11 -O2 -D_POSIX_C_SOURCE=200809L -Werror"
      - name: Build L2 with -Werror
        working-directory: l2
        run: make -j$(nproc) CFLAGS="-Wall -Wextra -std=c11 -O2 -D_POSIX_C_SOURCE=200809L -Wno-unused-function -Werror -I../l3"

  # ──────────────────────────────────────────────────────────────
  # Job 7: Build with sanitizers
  # ──────────────────────────────────────────────────────────────
  build-sanitizers:
    name: Build (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make
      - name: Build L3 with sanitizers
        working-directory: l3
        run: make -j$(nproc) CFLAGS="-Wall -Wextra -std=c11 -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -D_POSIX_C_SOURCE=200809L" LDFLAGS="-fsanitize=address,undefined"
      - name: Build L2 with sanitizers
        working-directory: l2
        run: make -j$(nproc) CFLAGS="-Wall -Wextra -std=c11 -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -D_POSIX_C_SOURCE=200809L -Wno-unused-function -I../l3" LDFLAGS="-fsanitize=address,undefined"

  # ──────────────────────────────────────────────────────────────
  # Job 8: Build matrix (compilers)
  # ──────────────────────────────────────────────────────────────
  build-matrix:
    name: Build (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ${{ matrix.compiler }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.compiler }} make
      - name: Build project
        run: make all -j$(nproc) CC=${{ matrix.compiler }}
